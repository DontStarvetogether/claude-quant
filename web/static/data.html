<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据管理 — Claude Quant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-6">
    <span class="text-blue-400 font-bold tracking-tight text-lg">CLAUDE QUANT</span>
    <nav class="flex gap-4 text-sm">
      <a href="/" class="text-gray-400 hover:text-gray-100 transition-colors">回测</a>
      <a href="/strategies.html" class="text-gray-400 hover:text-gray-100 transition-colors">策略库</a>
      <a href="/data.html" class="text-gray-100 font-medium">数据管理</a>
      <a href="/compare.html" class="text-gray-400 hover:text-gray-100 transition-colors">策略对比</a>
      <a href="/live.html" class="text-gray-400 hover:text-gray-100 transition-colors">交易</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

    <div>
      <h1 class="text-2xl font-bold text-gray-100 mb-1">数据管理</h1>
      <p class="text-sm text-gray-500">管理本地 A 股历史行情数据</p>
    </div>

    <!-- 统计概览 -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="metric-card">
        <p class="metric-label">本地股票数</p>
        <p id="stat-symbols" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">总记录数</p>
        <p id="stat-records" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">磁盘占用</p>
        <p id="stat-disk" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">最新数据日期</p>
        <p id="stat-latest" class="metric-value text-sm">—</p>
      </div>
    </section>

    <!-- 下载/更新数据 -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4">下载 / 更新数据</h2>

      <div class="space-y-4">
        <!-- 输入股票代码 -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">股票代码（留空表示更新所有本地数据）</label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <input id="dl-symbol-input" type="text" placeholder="输入代码或名称搜索，如 茅台 / 600519"
                autocomplete="off"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500 text-sm" />
              <div id="dl-symbol-dropdown"
                class="hidden absolute z-50 left-0 right-0 top-full mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-xl max-h-56 overflow-y-auto"></div>
            </div>
            <button type="button" id="dl-add-btn"
              class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">添加</button>
          </div>
          <!-- 已选股票标签 -->
          <div id="dl-selected-section" class="mt-2 hidden">
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs text-gray-500">
                已选择 <span id="dl-selected-count" class="text-blue-400 font-semibold">0</span> 只股票
              </span>
              <button type="button" id="dl-clear-all" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">清空</button>
            </div>
            <div id="dl-symbol-tags" class="flex gap-2 flex-wrap"></div>
          </div>
          <!-- 常用股票 -->
          <div class="flex items-center justify-between mt-3 mb-1.5">
            <span class="text-xs text-gray-500">常用股票</span>
            <button type="button" id="quick-toggle-expand-btn"
              class="text-xs text-blue-400 hover:text-blue-300 transition-colors">展开全部</button>
          </div>
          <div id="quick-symbol-container" class="flex gap-2 flex-wrap"></div>
          <div class="flex gap-3 mt-2">
            <button type="button" id="dl-select-all-btn"
              class="text-xs text-blue-400 hover:text-blue-300 transition-colors">全选</button>
            <button type="button" id="dl-clear-all-2"
              class="text-xs text-gray-500 hover:text-gray-300 transition-colors">清空</button>
          </div>

          <!-- 隐藏字段，保存已选代码 -->
          <input id="dl-symbols" type="hidden" />
        </div>

        <!-- 起始日期 -->
        <div class="flex gap-4 items-end">
          <div class="flex-1">
            <label class="block text-sm text-gray-400 mb-1">数据起始日期</label>
            <input id="dl-start-date" type="date" value="2020-01-01"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500 text-sm" />
            <div class="flex gap-2 mt-1" id="date-shortcuts">
              <button type="button" data-months="3" class="px-2 py-0.5 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近3月</button>
              <button type="button" data-months="12" class="px-2 py-0.5 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近1年</button>
              <button type="button" data-months="24" class="px-2 py-0.5 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近2年</button>
              <button type="button" data-months="36" class="px-2 py-0.5 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近3年</button>
              <button type="button" data-months="60" class="px-2 py-0.5 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近5年</button>
            </div>
          </div>
          <button id="dl-btn"
            class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            开始下载
          </button>
          <button id="dl-update-all-btn"
            class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium text-gray-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            更新全部
          </button>
        </div>

        <!-- 进度区域 -->
        <div id="dl-progress-area" class="hidden space-y-2">
          <div class="flex justify-between text-xs text-gray-500">
            <span id="dl-progress-text">准备中...</span>
            <span id="dl-progress-count"></span>
          </div>
          <div class="w-full bg-gray-800 rounded-full h-1.5">
            <div id="dl-progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
          </div>
          <p id="dl-current" class="text-xs text-gray-500"></p>
          <div id="dl-errors" class="hidden">
            <p class="text-xs text-red-400 mt-1">失败股票：</p>
            <ul id="dl-error-list" class="text-xs text-red-400 ml-3 space-y-0.5 max-h-24 overflow-y-auto"></ul>
          </div>
        </div>
      </div>
    </section>

    <!-- 本地数据列表 -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-300">本地数据</h2>
        <div class="flex items-center gap-3">
          <input id="search-input" type="text" placeholder="搜索代码或名称..."
            class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500 w-44" />
          <span id="table-total" class="text-xs text-gray-500"></span>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="text-gray-500 border-b border-gray-800">
              <th class="text-left pb-2 pr-4">代码</th>
              <th class="text-left pb-2 pr-4">名称</th>
              <th class="text-right pb-2 pr-4">起始日期</th>
              <th class="text-right pb-2 pr-4">最新日期</th>
              <th class="text-right pb-2 pr-4">记录数</th>
              <th class="text-right pb-2">状态</th>
            </tr>
          </thead>
          <tbody id="data-tbody" class="divide-y divide-gray-800/50"></tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div id="pagination" class="flex items-center justify-between mt-4 text-xs text-gray-500">
        <button id="prev-btn"
          class="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          上一页
        </button>
        <span id="page-info"></span>
        <button id="next-btn"
          class="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          下一页
        </button>
      </div>
    </section>

  </main>

  <script src="/static/js/api.js"></script>
  <script>
    // ── 状态 ──────────────────────────────────────────────────────────────────
    let currentPage = 0;
    const PAGE_SIZE = 50;
    let totalItems = 0;
    let searchQuery = '';
    let searchTimer = null;

    // ── 股票搜索选择器 ──────────────────────────────────────────────────────
    let allSymbols = [];          // 全量股票列表 [{symbol, name}, ...]
    let dlSelectedSymbols = [];   // 已选股票代码

    async function loadAllSymbols() {
      try {
        const res = await fetch('/api/symbols?sync_names=true');
        if (!res.ok) return;
        const data = await res.json();
        allSymbols = data.symbols || [];
      } catch (e) {
        console.error('加载股票列表失败', e);
      }
    }

    function dlGetMatches(q) {
      if (!q) return [];
      const term = q.toLowerCase();
      return allSymbols.filter(s =>
        s.symbol.toLowerCase().includes(term) ||
        (s.name && s.name.toLowerCase().includes(term))
      ).slice(0, 15);
    }

    function setupDlSymbolInput() {
      const input = document.getElementById('dl-symbol-input');
      const dropdown = document.getElementById('dl-symbol-dropdown');
      const addBtn = document.getElementById('dl-add-btn');
      let activeIdx = -1;

      function renderDropdown(matches) {
        if (!matches.length) { dropdown.classList.add('hidden'); return; }
        activeIdx = -1;
        dropdown.innerHTML = matches.map((s, i) => {
          const selected = dlSelectedSymbols.includes(s.symbol);
          return `
            <div data-idx="${i}" data-symbol="${s.symbol}"
              class="flex items-center justify-between px-3 py-2 cursor-pointer hover:bg-gray-700 text-sm ${selected ? 'opacity-50' : ''}">
              <span class="font-mono text-gray-300">${s.symbol}</span>
              <span class="text-gray-400 text-xs ml-3">${s.name || ''}</span>
              ${selected ? '<span class="text-xs text-blue-400 ml-2">已选</span>' : ''}
            </div>`;
        }).join('');
        dropdown.classList.remove('hidden');

        dropdown.querySelectorAll('[data-symbol]').forEach(row => {
          row.addEventListener('mousedown', e => {
            e.preventDefault();
            dlPickSymbol(row.dataset.symbol);
          });
        });
      }

      function highlightItem(idx) {
        const items = dropdown.querySelectorAll('[data-idx]');
        items.forEach(el => el.classList.remove('bg-gray-700'));
        if (idx >= 0 && items[idx]) items[idx].classList.add('bg-gray-700');
      }

      input.addEventListener('input', () => {
        renderDropdown(dlGetMatches(input.value.trim()));
      });

      input.addEventListener('keydown', e => {
        const items = dropdown.querySelectorAll('[data-idx]');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIdx = Math.min(activeIdx + 1, items.length - 1);
          highlightItem(activeIdx);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, -1);
          highlightItem(activeIdx);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (activeIdx >= 0 && items[activeIdx]) {
            dlPickSymbol(items[activeIdx].dataset.symbol);
          } else {
            const val = input.value.trim().toUpperCase();
            if (val) dlAddSymbol(val);
            input.value = '';
            dropdown.classList.add('hidden');
          }
        } else if (e.key === 'Escape') {
          dropdown.classList.add('hidden');
          activeIdx = -1;
        }
      });

      input.addEventListener('blur', () => {
        setTimeout(() => dropdown.classList.add('hidden'), 150);
      });

      addBtn.addEventListener('click', () => {
        const val = input.value.trim();
        const matches = dlGetMatches(val);
        if (matches.length === 1) {
          dlPickSymbol(matches[0].symbol);
        } else if (val) {
          dlAddSymbol(val.toUpperCase());
        }
        input.value = '';
        dropdown.classList.add('hidden');
      });

      document.getElementById('dl-clear-all').addEventListener('click', () => {
        dlSelectedSymbols = [];
        dlRenderTags();
      });
    }

    function dlPickSymbol(symbol) {
      dlAddSymbol(symbol);
      document.getElementById('dl-symbol-input').value = '';
      document.getElementById('dl-symbol-dropdown').classList.add('hidden');
    }

    function dlAddSymbol(symbol) {
      if (!symbol) return;
      // 尝试自动补全后缀
      if (/^\d{6}$/.test(symbol)) {
        const match = allSymbols.find(s => s.symbol.startsWith(symbol));
        if (match) symbol = match.symbol;
        else symbol = symbol.startsWith('6') ? symbol + '.SH' : symbol + '.SZ';
      }
      if (dlSelectedSymbols.includes(symbol)) return;
      dlSelectedSymbols.push(symbol);
      dlRenderTags();
    }

    function dlRemoveSymbol(symbol) {
      dlSelectedSymbols = dlSelectedSymbols.filter(s => s !== symbol);
      dlRenderTags();
    }

    function dlRenderTags() {
      const section = document.getElementById('dl-selected-section');
      const tags = document.getElementById('dl-symbol-tags');
      const count = document.getElementById('dl-selected-count');
      const hidden = document.getElementById('dl-symbols');

      if (!dlSelectedSymbols.length) {
        section.classList.add('hidden');
        hidden.value = '';
        return;
      }

      section.classList.remove('hidden');
      count.textContent = dlSelectedSymbols.length;
      hidden.value = dlSelectedSymbols.join(' ');

      tags.innerHTML = dlSelectedSymbols.map(sym => {
        const info = allSymbols.find(s => s.symbol === sym);
        const name = info ? info.name : '';
        return `
          <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-gray-800 border border-gray-700 rounded text-xs text-gray-300">
            <span class="font-mono">${sym}</span>
            ${name ? `<span class="text-gray-500">${name}</span>` : ''}
            <button type="button" onclick="dlRemoveSymbol('${sym}')"
              class="ml-0.5 text-gray-500 hover:text-red-400 transition-colors">&times;</button>
          </span>`;
      }).join('');
    }

    // 快捷日期按钮（数据管理只有起始日期）
    document.getElementById('date-shortcuts')?.addEventListener('click', e => {
      const btn = e.target.closest('[data-months]');
      if (!btn) return;
      const months = parseInt(btn.dataset.months);
      const start = new Date();
      start.setMonth(start.getMonth() - months);
      document.getElementById('dl-start-date').value = start.toISOString().slice(0, 10);
    });

    // 今天的日期字符串（用于判断数据是否最新）
    const TODAY = new Date().toISOString().slice(0, 10);
    // 7天前（认为数据不是最新）
    const STALE_DAYS = 7;

    // ── API 封装 ──────────────────────────────────────────────────────────────

    async function fetchStats() {
      const res = await fetch('/api/data/stats');
      if (!res.ok) throw new Error('获取统计失败');
      return res.json();
    }

    async function fetchSymbols(page, q) {
      const params = new URLSearchParams({ page, page_size: PAGE_SIZE, q });
      const res = await fetch(`/api/data/symbols?${params}`);
      if (!res.ok) throw new Error('获取数据列表失败');
      return res.json();
    }

    async function postDownload(symbols, startDate) {
      const res = await fetch('/api/data/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symbols, start_date: startDate }),
      });
      if (!res.ok) throw new Error('下载请求失败');
      return res.json();
    }

    // ── 加载统计 ──────────────────────────────────────────────────────────────

    async function loadStats() {
      try {
        const s = await fetchStats();
        document.getElementById('stat-symbols').textContent = s.total_symbols.toLocaleString();
        document.getElementById('stat-records').textContent = s.total_records.toLocaleString();
        document.getElementById('stat-disk').textContent = s.disk_usage_mb >= 1024
          ? (s.disk_usage_mb / 1024).toFixed(1) + ' GB'
          : s.disk_usage_mb.toFixed(0) + ' MB';
        document.getElementById('stat-latest').textContent = s.latest_date || '—';
      } catch (e) {
        console.error('加载统计失败', e);
      }
    }

    // ── 加载数据列表 ──────────────────────────────────────────────────────────

    function dateFreshness(lastDate) {
      if (!lastDate) return { cls: 'text-gray-600', label: '无数据' };
      const diff = (new Date(TODAY) - new Date(lastDate)) / 86400000;
      if (diff <= STALE_DAYS) return { cls: 'text-green-400', label: '最新' };
      if (diff <= 30) return { cls: 'text-yellow-400', label: `${Math.round(diff)}天前` };
      return { cls: 'text-red-400', label: `${Math.round(diff)}天前` };
    }

    async function loadTable() {
      const tbody = document.getElementById('data-tbody');
      tbody.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-gray-600">加载中...</td></tr>';

      try {
        const data = await fetchSymbols(currentPage, searchQuery);
        totalItems = data.total;

        document.getElementById('table-total').textContent = `共 ${totalItems} 只`;
        document.getElementById('page-info').textContent =
          `第 ${currentPage + 1} / ${Math.max(1, Math.ceil(totalItems / PAGE_SIZE))} 页`;
        document.getElementById('prev-btn').disabled = currentPage === 0;
        document.getElementById('next-btn').disabled = (currentPage + 1) * PAGE_SIZE >= totalItems;

        if (!data.items.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-gray-600">暂无数据</td></tr>';
          return;
        }

        tbody.innerHTML = data.items.map(item => {
          const fresh = dateFreshness(item.last_date);
          return `
            <tr class="hover:bg-gray-800/30 transition-colors">
              <td class="py-1.5 pr-4 font-mono text-gray-300">${item.symbol}</td>
              <td class="py-1.5 pr-4 text-gray-400">${item.name || '—'}</td>
              <td class="py-1.5 pr-4 text-right text-gray-500">${item.first_date || '—'}</td>
              <td class="py-1.5 pr-4 text-right text-gray-400">${item.last_date || '—'}</td>
              <td class="py-1.5 pr-4 text-right text-gray-400">${item.records ? item.records.toLocaleString() : '0'}</td>
              <td class="py-1.5 text-right ${fresh.cls}">${fresh.label}</td>
            </tr>`;
        }).join('');
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" class="py-4 text-center text-red-400">${e.message}</td></tr>`;
      }
    }

    // ── 下载进度 ──────────────────────────────────────────────────────────────

    function startProgressStream(taskId, total) {
      const area = document.getElementById('dl-progress-area');
      const bar = document.getElementById('dl-progress-bar');
      const text = document.getElementById('dl-progress-text');
      const count = document.getElementById('dl-progress-count');
      const current = document.getElementById('dl-current');
      const errorsDiv = document.getElementById('dl-errors');
      const errorList = document.getElementById('dl-error-list');

      area.classList.remove('hidden');
      errorsDiv.classList.add('hidden');
      errorList.innerHTML = '';

      const evtSource = new EventSource(`/api/data/download/${taskId}/progress`);

      evtSource.onmessage = (e) => {
        const d = JSON.parse(e.data);

        // 结束标志：{done: true}（布尔值）
        if (d.done === true) {
          evtSource.close();
          bar.style.width = '100%';
          text.textContent = '完成';
          setDownloadBtns(true);
          loadStats();
          loadTable();
          return;
        }

        // done_flag 表示下载任务已结束（含完成/失败），更新最终状态
        if (d.done_flag) {
          const pct = total > 0 ? Math.round(d.done / total * 100) : 100;
          bar.style.width = pct + '%';
          text.textContent = d.status === 'completed' ? '完成' : '失败';
          count.textContent = `${d.done} / ${total}`;
          current.textContent = '';
        } else {
          const pct = total > 0 ? Math.round(d.done / total * 100) : 0;
          bar.style.width = pct + '%';
          text.textContent = d.status === 'failed' ? '失败' : '下载中...';
          count.textContent = `${d.done} / ${total}`;
          current.textContent = d.current ? `当前：${d.current}` : '';
        }

        if (d.errors && d.errors.length > 0) {
          errorsDiv.classList.remove('hidden');
          errorList.innerHTML = d.errors.map(er => `<li>${er}</li>`).join('');
        }
      };

      evtSource.onerror = () => {
        evtSource.close();
        setDownloadBtns(true);
        text.textContent = '连接中断';
      };
    }

    function setDownloadBtns(enabled) {
      document.getElementById('dl-btn').disabled = !enabled;
      document.getElementById('dl-update-all-btn').disabled = !enabled;
    }

    // ── 事件绑定 ──────────────────────────────────────────────────────────────

    document.getElementById('dl-btn').addEventListener('click', async () => {
      const startDate = document.getElementById('dl-start-date').value;
      const symbols = [...dlSelectedSymbols];

      if (!symbols.length) {
        alert('请输入至少一个股票代码，或点击"更新全部"');
        return;
      }

      setDownloadBtns(false);
      try {
        const { task_id } = await postDownload(symbols, startDate);
        startProgressStream(task_id, symbols.length);
      } catch (e) {
        alert('下载失败：' + e.message);
        setDownloadBtns(true);
      }
    });

    document.getElementById('dl-update-all-btn').addEventListener('click', async () => {
      // 更新所有本地已有股票
      try {
        const data = await fetchSymbols(0, '');
        // 获取全量 symbol 列表（不分页）
        const allRes = await fetch(`/api/data/symbols?page=0&page_size=5000`);
        const allData = await allRes.json();
        const symbols = allData.items.map(i => i.symbol);

        if (!symbols.length) {
          alert('本地暂无股票数据，请先输入代码下载');
          return;
        }

        const startDate = document.getElementById('dl-start-date').value;
        setDownloadBtns(false);
        const { task_id } = await postDownload(symbols, startDate);
        startProgressStream(task_id, symbols.length);
      } catch (e) {
        alert('操作失败：' + e.message);
        setDownloadBtns(true);
      }
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.trim();
        currentPage = 0;
        loadTable();
      }, 300);
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentPage > 0) { currentPage--; loadTable(); }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if ((currentPage + 1) * PAGE_SIZE < totalItems) { currentPage++; loadTable(); }
    });

    // ── 初始化 ────────────────────────────────────────────────────────────────

    loadStats();
    loadTable();
    // 常用股票
    let dlQuickExpanded = false;
    const DL_QUICK_LIMIT = 25;
    function dlRenderQuickSymbols() {
      const c = document.getElementById('quick-symbol-container');
      if (!c || !allSymbols.length) return;
      const n = dlQuickExpanded ? allSymbols.length : DL_QUICK_LIMIT;
      const rem = allSymbols.length - DL_QUICK_LIMIT;
      c.innerHTML = allSymbols.slice(0, n).map(s => `<button type="button" onclick="dlAddSymbol('${s.symbol}')" class="px-2.5 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">${s.name || s.symbol}</button>`).join('');
      const btn = document.getElementById('quick-toggle-expand-btn');
      if (btn) btn.textContent = (!dlQuickExpanded && rem > 0) ? `展开全部（+${rem}）` : '收起';
    }
    loadAllSymbols().then(() => { setupDlSymbolInput(); dlRenderQuickSymbols(); });
    document.getElementById('quick-toggle-expand-btn')?.addEventListener('click', () => { dlQuickExpanded = !dlQuickExpanded; dlRenderQuickSymbols(); });
    document.getElementById('dl-select-all-btn')?.addEventListener('click', () => { dlSelectedSymbols = allSymbols.slice(0, 50).map(s => s.symbol); dlRenderTags(); });
    document.getElementById('dl-clear-all-2')?.addEventListener('click', () => { dlSelectedSymbols = []; dlRenderTags(); });
  </script>
</body>
</html>
