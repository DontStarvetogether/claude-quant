<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>策略对比 — Claude Quant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-6">
    <span class="text-blue-400 font-bold tracking-tight text-lg">CLAUDE QUANT</span>
    <nav class="flex gap-4 text-sm">
      <a href="/" class="text-gray-400 hover:text-gray-100 transition-colors">回测</a>
      <a href="/strategies.html" class="text-gray-400 hover:text-gray-100 transition-colors">策略库</a>
      <a href="/data.html" class="text-gray-400 hover:text-gray-100 transition-colors">数据管理</a>
      <a href="/compare.html" class="text-gray-100 font-medium">策略对比</a>
      <a href="/live.html" class="text-gray-400 hover:text-gray-100 transition-colors">交易</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">

    <div>
      <h1 class="text-2xl font-bold text-gray-100 mb-1">策略对比</h1>
      <p class="text-sm text-gray-500">相同标的和时间区间，横向对比多个策略的表现</p>
    </div>

    <!-- 配置区 -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-5">
      <h2 class="text-sm font-semibold text-gray-300">回测配置（所有策略共用）</h2>

      <!-- 股票代码 -->
      <div>
        <label class="block text-sm text-gray-400 mb-1">股票代码</label>
        <div class="flex gap-2">
          <div class="relative flex-1">
            <input id="symbol-input" type="text" placeholder="代码或公司名，如 茅台 / 600519"
              autocomplete="off"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500" />
            <div id="symbol-dropdown"
              class="hidden absolute z-50 left-0 right-0 top-full mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-xl max-h-56 overflow-y-auto"></div>
          </div>
          <button id="add-symbol-btn" type="button"
            class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">添加</button>
        </div>
        <div id="symbol-tags" class="flex flex-wrap gap-2 min-h-6 mt-2"></div>
        <!-- 常用股票 -->
        <div class="flex items-center justify-between mt-3 mb-1.5">
          <span class="text-xs text-gray-500">常用股票</span>
          <button type="button" id="quick-toggle-expand-btn"
            class="text-xs text-blue-400 hover:text-blue-300 transition-colors">展开全部</button>
        </div>
        <div id="quick-symbol-container" class="flex gap-2 flex-wrap"></div>
        <div class="flex gap-3 mt-2">
          <button type="button" id="select-all-btn"
            class="text-xs text-blue-400 hover:text-blue-300 transition-colors">全选</button>
          <button type="button" id="clear-all-btn"
            class="text-xs text-gray-500 hover:text-gray-300 transition-colors">清空</button>
        </div>
        <div class="mt-4 bg-gray-800/60 border border-gray-700 rounded-lg p-4 space-y-3">
          <div>
            <p class="text-xs text-gray-500 mb-2">股票池预设</p>
            <div id="symbol-preset-buttons" class="flex gap-2 flex-wrap"></div>
          </div>
          <div>
            <p class="text-xs text-gray-500 mb-2">市场阶段预设</p>
            <div id="period-preset-buttons" class="flex gap-2 flex-wrap"></div>
          </div>
        </div>
      </div>

      <!-- 日期 + 资金 -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">开始日期</label>
          <input id="start-date" type="date"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500" />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">结束日期</label>
          <input id="end-date" type="date"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500" />
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm text-gray-400 mb-1">初始资金（元）</label>
          <input id="initial-capital" type="number" value="1000000" min="10000" step="10000"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500" />
        </div>
      </div>
      <div class="flex gap-2 mt-2" id="date-shortcuts">
        <button type="button" data-months="3" class="px-2 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近3月</button>
        <button type="button" data-months="12" class="px-2 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近1年</button>
        <button type="button" data-months="24" class="px-2 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近2年</button>
        <button type="button" data-months="36" class="px-2 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近3年</button>
        <button type="button" data-months="60" class="px-2 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">近5年</button>
      </div>

      <!-- 样本检查 -->
      <div id="sample-check" class="bg-gray-800/60 border border-gray-700 rounded-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm font-semibold text-gray-300">样本检查</span>
          <span id="sample-check-badge" class="text-xs text-gray-500">待选择</span>
        </div>
        <div class="grid grid-cols-3 gap-3 text-xs">
          <div>
            <p class="text-gray-500">股票数</p>
            <p id="sample-symbol-count" class="text-sm font-semibold text-gray-200">0</p>
          </div>
          <div>
            <p class="text-gray-500">时间跨度</p>
            <p id="sample-years" class="text-sm font-semibold text-gray-200">—</p>
          </div>
          <div>
            <p class="text-gray-500">用途</p>
            <p id="sample-purpose" class="text-sm font-semibold text-gray-200">—</p>
          </div>
        </div>
        <p id="sample-check-note" class="text-xs text-gray-500 mt-3">添加股票后会自动评估样本质量</p>
      </div>

      <!-- 策略列表 -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <label class="text-sm text-gray-400">参与对比的策略</label>
          <button id="add-strategy-btn" type="button"
            class="text-xs text-blue-400 hover:text-blue-300 transition-colors">+ 添加策略</button>
        </div>
        <div id="strategy-rows" class="space-y-3"></div>
      </div>

      <div id="form-error" class="hidden text-red-400 text-sm px-3 py-2 bg-red-900/30 rounded-lg border border-red-800"></div>

      <button id="run-btn"
        class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-semibold text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        开始对比
      </button>
    </section>

    <!-- 进度区 -->
    <section id="progress-section" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4">运行进度</h2>
      <div id="progress-rows" class="space-y-3"></div>
    </section>

    <!-- 结果区 -->
    <section id="result-section" class="hidden space-y-6">

      <!-- 评估摘要 -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold text-gray-300">评估摘要</h2>
          <span id="sample-summary" class="text-xs text-gray-500"></span>
        </div>
        <div id="evaluation-panel" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4"></div>
        <div id="evaluation-notes" class="mt-4 grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
      </div>

      <!-- 权益曲线对比 -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <h2 class="text-sm font-semibold text-gray-300 mb-4">权益曲线对比（收益率 %）</h2>
        <div id="compare-chart" style="height:380px;"></div>
      </div>

      <!-- 指标对比表 -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <h2 class="text-sm font-semibold text-gray-300 mb-4">指标对比</h2>
        <div class="overflow-x-auto">
          <table id="metrics-table" class="w-full text-sm"></table>
        </div>
      </div>

    </section>

  </main>

  <script src="/static/js/api.js?v=2"></script>
  <script>
  // ── 调色板 ────────────────────────────────────────────────────────────────
  const COLORS = ['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#38bdf8','#4ade80'];
  let SYMBOL_PRESETS = [];
  const PERIOD_PRESETS = [
    { id: 'five_years', label: '近5年', months: 60 },
    { id: 'three_years', label: '近3年', months: 36 },
    { id: 'bull_rebound', label: '修复上涨 2020-03~2021-02', start: '2020-03-23', end: '2021-02-18' },
    { id: 'bear_stress', label: '弱市压力 2021-02~2022-04', start: '2021-02-18', end: '2022-04-26' },
    { id: 'range_market', label: '震荡分化 2022-04~2023-12', start: '2022-04-27', end: '2023-12-29' },
    { id: 'long_cycle', label: '完整周期 2020~2024', start: '2020-01-01', end: '2024-12-31' },
  ];

  // ── 状态 ──────────────────────────────────────────────────────────────────
  let allStrategies = [];       // 从 API 拿到的策略定义
  let selectedSymbols = new Set();
  let activeUniverse = customUniverse();
  let strategyRows = [];        // [{ id, color, params:{} }]
  let rowCounter = 0;

  function customUniverse() {
    return {
      universe_id: 'custom_static',
      universe_name: '自定义静态股票池',
      source: 'user_selection',
      construction: 'static',
    };
  }

  function presetUniverse(preset) {
    return {
      universe_id: `preset_${preset.id}`,
      universe_name: preset.label,
      source: preset.source || 'builtin_preset',
      construction: preset.construction || 'static',
    };
  }

  // ── 初始化 ────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    initDates();
    // 加载股票池和策略
    try {
      const symRes = await API.getSymbols();
      allCompareSymbols = symRes.symbols || [];
    } catch(e) { allCompareSymbols = []; }
    try {
      const universeRes = await API.getUniverses();
      SYMBOL_PRESETS = (universeRes.universes || []).map(u => ({
        id: u.id,
        label: u.name,
        source: u.source,
        construction: u.construction,
        symbols: u.symbols || [],
      }));
    } catch(e) { SYMBOL_PRESETS = []; }
    renderPresetButtons();
    renderQuickSymbols();
    allStrategies = (await API.getStrategies()).strategies;
    addStrategyRow();
    addStrategyRow();
    setupSymbolInput();
    document.getElementById('add-strategy-btn').addEventListener('click', addStrategyRow);
    document.getElementById('run-btn').addEventListener('click', runAll);
    updateSampleCheck();
  });

  function initDates() {
    const today = new Date();
    const threeYearsAgo = new Date(today);
    threeYearsAgo.setFullYear(today.getFullYear() - 3);
    document.getElementById('end-date').value = today.toISOString().slice(0, 10);
    document.getElementById('start-date').value = threeYearsAgo.toISOString().slice(0, 10);

    document.getElementById('date-shortcuts')?.addEventListener('click', e => {
      const btn = e.target.closest('[data-months]');
      if (!btn) return;
      const months = parseInt(btn.dataset.months);
      const end = new Date();
      const start = new Date(end);
      start.setMonth(start.getMonth() - months);
      document.getElementById('start-date').value = start.toISOString().slice(0, 10);
      document.getElementById('end-date').value = end.toISOString().slice(0, 10);
      updateSampleCheck();
    });

    document.getElementById('start-date')?.addEventListener('change', updateSampleCheck);
    document.getElementById('end-date')?.addEventListener('change', updateSampleCheck);
  }

  function renderPresetButtons() {
    const symbolBox = document.getElementById('symbol-preset-buttons');
    if (symbolBox) {
      symbolBox.innerHTML = SYMBOL_PRESETS.map(p => `<button type="button" data-symbol-preset="${p.id}" class="px-2.5 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">${p.label}</button>`).join('');
      symbolBox.querySelectorAll('[data-symbol-preset]').forEach(btn => btn.addEventListener('click', () => applySymbolPreset(btn.dataset.symbolPreset)));
    }

    const periodBox = document.getElementById('period-preset-buttons');
    if (periodBox) {
      periodBox.innerHTML = PERIOD_PRESETS.map(p => `<button type="button" data-period-preset="${p.id}" class="px-2.5 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">${p.label}</button>`).join('');
      periodBox.querySelectorAll('[data-period-preset]').forEach(btn => btn.addEventListener('click', () => applyPeriodPreset(btn.dataset.periodPreset)));
    }
  }

  function applySymbolPreset(presetId) {
    const preset = SYMBOL_PRESETS.find(p => p.id === presetId);
    if (!preset) return;

    const available = new Set(allCompareSymbols.map(s => s.symbol));
    const symbols = preset.symbols.filter(sym => available.size === 0 || available.has(sym));
    selectedSymbols = new Set(symbols);
    activeUniverse = presetUniverse(preset);
    renderSymbolTags();
    clearError();

    if (!symbols.length) showError(`当前数据中没有匹配的「${preset.label}」样本`);
  }

  function applyPeriodPreset(presetId) {
    const preset = PERIOD_PRESETS.find(p => p.id === presetId);
    if (!preset) return;

    if (preset.months) {
      const end = new Date();
      const start = new Date(end);
      start.setMonth(start.getMonth() - preset.months);
      document.getElementById('start-date').value = start.toISOString().slice(0, 10);
      document.getElementById('end-date').value = end.toISOString().slice(0, 10);
    } else {
      document.getElementById('start-date').value = preset.start;
      document.getElementById('end-date').value = preset.end;
    }

    updateSampleCheck();
  }

  // ── 股票输入 ──────────────────────────────────────────────────────────────
  let allCompareSymbols = [];
  let quickExpanded = false;
  const QUICK_LIMIT = 25;

  function setupSymbolInput() {
    // 搜索下拉
    const input = document.getElementById('symbol-input');
    const dropdown = document.getElementById('symbol-dropdown');
    const btn = document.getElementById('add-symbol-btn');
    let activeIdx = -1;

    function getMatches(q) {
      if (!q) return [];
      const t = q.toLowerCase();
      return allCompareSymbols.filter(s => s.symbol.toLowerCase().includes(t) || (s.name && s.name.toLowerCase().includes(t))).slice(0, 12);
    }

    input.addEventListener('input', () => {
      const matches = getMatches(input.value.trim());
      activeIdx = -1;
      if (!matches.length) { dropdown.classList.add('hidden'); return; }
      dropdown.innerHTML = matches.map((s, i) => `<div class="flex items-center justify-between px-3 py-2 cursor-pointer hover:bg-gray-700 text-sm" onmousedown="event.preventDefault();selectCompareSymbol('${s.symbol}')"><span class="font-mono text-gray-300">${s.symbol}</span><span class="text-gray-400 text-xs ml-3">${s.name || ''}</span></div>`).join('');
      dropdown.classList.remove('hidden');
    });

    input.addEventListener('keydown', e => {
      const items = dropdown.querySelectorAll('div');
      const hl = idx => { items.forEach(el => el.classList.remove('bg-gray-700')); if (idx >= 0 && items[idx]) items[idx].classList.add('bg-gray-700'); };
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); hl(activeIdx); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, -1); hl(activeIdx); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].click();
        else { const v = input.value.trim(); if (v) { addCompareSymbol(normalizeSym(v)); input.value = ''; dropdown.classList.add('hidden'); } }
      } else if (e.key === 'Escape') { dropdown.classList.add('hidden'); activeIdx = -1; }
    });
    input.addEventListener('blur', () => setTimeout(() => dropdown.classList.add('hidden'), 150));

    btn.addEventListener('click', () => {
      const v = input.value.trim();
      if (!v) return;
      const matches = getMatches(v);
      if (matches.length === 1) selectCompareSymbol(matches[0].symbol);
      else { addCompareSymbol(normalizeSym(v)); input.value = ''; dropdown.classList.add('hidden'); }
    });

    // 常用股票
    document.getElementById('quick-toggle-expand-btn')?.addEventListener('click', () => { quickExpanded = !quickExpanded; renderQuickSymbols(); });
    document.getElementById('select-all-btn')?.addEventListener('click', () => {
      allCompareSymbols.slice(0, 50).forEach(s => selectedSymbols.add(s.symbol));
      activeUniverse = { universe_id: 'local_top50_static', universe_name: '本地缓存前50只股票', source: 'local_cache', construction: 'static' };
      renderSymbolTags();
    });
    document.getElementById('clear-all-btn')?.addEventListener('click', () => { selectedSymbols.clear(); activeUniverse = customUniverse(); renderSymbolTags(); });
  }

  function normalizeSym(s) { s = s.trim().toUpperCase(); if (/^\d{6}$/.test(s)) return s.startsWith('6') ? s + '.SH' : s + '.SZ'; return s; }
  function selectCompareSymbol(sym) { addCompareSymbol(sym); document.getElementById('symbol-input').value = ''; document.getElementById('symbol-dropdown').classList.add('hidden'); }
  function addCompareSymbol(sym) { if (!sym) return; selectedSymbols.add(sym.toUpperCase()); activeUniverse = customUniverse(); renderSymbolTags(); }

  function renderQuickSymbols() {
    const c = document.getElementById('quick-symbol-container');
    if (!c || !allCompareSymbols.length) return;
    const n = quickExpanded ? allCompareSymbols.length : QUICK_LIMIT;
    const rem = allCompareSymbols.length - QUICK_LIMIT;
    c.innerHTML = allCompareSymbols.slice(0, n).map(s => `<button type="button" onclick="addCompareSymbol('${s.symbol}')" class="px-2.5 py-1 text-xs bg-gray-800 border border-gray-700 rounded hover:border-blue-500 hover:text-blue-400 text-gray-400 transition-colors">${s.name || s.symbol}</button>`).join('');
    const btn = document.getElementById('quick-toggle-expand-btn');
    if (btn) btn.textContent = (!quickExpanded && rem > 0) ? `展开全部（+${rem}）` : '收起';
  }

  function renderSymbolTags() {
    const c = document.getElementById('symbol-tags');
    updateSampleCheck();
    if (selectedSymbols.size === 0) { c.innerHTML = '<span class="text-xs text-gray-600">请搜索并添加股票</span>'; return; }
    c.innerHTML = [...selectedSymbols].map(sym => {
      const info = allCompareSymbols.find(s => s.symbol === sym);
      return `<span class="inline-flex items-center gap-1 px-2 py-1 bg-gray-800 border border-gray-700 rounded text-xs text-gray-300"><span class="font-mono">${sym}</span>${info ? '<span class="text-gray-500">' + info.name + '</span>' : ''}<button onclick="event.stopPropagation();selectedSymbols.delete('${sym}');activeUniverse=customUniverse();renderSymbolTags()" class="ml-1 text-gray-500 hover:text-red-400">&times;</button></span>`;
    }).join('');
  }

  // ── 策略行 ────────────────────────────────────────────────────────────────
  function addStrategyRow() {
    if (strategyRows.length >= COLORS.length) return;
    const rowId = ++rowCounter;
    const color = COLORS[strategyRows.length];
    const defaultStrategy = allStrategies[strategyRows.length % allStrategies.length];
    strategyRows.push({ rowId, color, strategyId: defaultStrategy?.id });

    const container = document.getElementById('strategy-rows');
    const div = document.createElement('div');
    div.id = `row-${rowId}`;
    div.className = 'bg-gray-800 rounded-xl p-4 space-y-3';
    div.innerHTML = `
      <div class="flex items-center gap-3">
        <span class="w-3 h-3 rounded-full shrink-0" style="background:${color}"></span>
        <select data-row="${rowId}" class="strategy-select flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
          ${allStrategies.map(s => `<option value="${s.id}" ${s.id === defaultStrategy?.id ? 'selected' : ''}>${s.name}</option>`).join('')}
        </select>
        <button data-row="${rowId}" class="remove-row-btn text-gray-600 hover:text-red-400 transition-colors text-lg leading-none">×</button>
      </div>
      <div data-row-params="${rowId}" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
    `;
    container.appendChild(div);

    div.querySelector('.strategy-select').addEventListener('change', e => {
      const r = strategyRows.find(r => r.rowId == e.target.dataset.row);
      if (r) r.strategyId = e.target.value;
      renderRowParams(rowId, e.target.value);
    });
    div.querySelector('.remove-row-btn').addEventListener('click', e => {
      const rid = parseInt(e.target.dataset.row);
      strategyRows = strategyRows.filter(r => r.rowId !== rid);
      document.getElementById(`row-${rid}`).remove();
    });

    renderRowParams(rowId, defaultStrategy?.id);
  }

  function renderRowParams(rowId, strategyId) {
    const strategy = allStrategies.find(s => s.id === strategyId);
    const container = document.querySelector(`[data-row-params="${rowId}"]`);
    if (!strategy || !strategy.params.length) { container.innerHTML = ''; return; }

    container.innerHTML = strategy.params.map(p => `
      <div>
        <label class="flex justify-between text-xs text-gray-500 mb-1">
          <span>${p.label}</span>
          <span id="p-${rowId}-${p.name}-lbl">${p.default}</span>
        </label>
        ${p.type === 'bool' ? `
          <input id="p-${rowId}-${p.name}"
            data-row="${rowId}" data-param="${p.name}" data-type="${p.type}"
            type="checkbox" ${p.default ? 'checked' : ''}
            class="accent-blue-500" />
        ` : `
          <input id="p-${rowId}-${p.name}"
            data-row="${rowId}" data-param="${p.name}" data-type="${p.type}"
            type="range" min="${p.min ?? 1}" max="${p.max ?? 100}" step="${p.step ?? 1}" value="${p.default}"
            class="w-full accent-blue-500" />
        `}
      </div>`).join('');

    container.querySelectorAll('input[type=range]').forEach(inp => {
      const lbl = document.getElementById(`p-${rowId}-${inp.dataset.param}-lbl`);
      inp.addEventListener('input', () => { lbl.textContent = inp.value; });
    });
  }

  function getRowParams(rowId) {
    const params = {};
    document.querySelectorAll(`[data-row="${rowId}"][data-param]`).forEach(el => {
      const t = el.dataset.type;
      params[el.dataset.param] = t === 'int' ? parseInt(el.value) : t === 'float' ? parseFloat(el.value) : t === 'bool' ? el.checked : el.value;
    });
    return params;
  }

  // ── 运行全部 ──────────────────────────────────────────────────────────────
  async function runAll() {
    clearError();
    if (selectedSymbols.size === 0) { showError('请至少添加一只股票代码'); return; }
    if (strategyRows.length === 0) { showError('请至少添加一个策略'); return; }
    if (strategyRows.length < 2) { showError('请添加至少两个策略进行对比'); return; }

    const symbols = [...selectedSymbols];
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;
    const capital = parseFloat(document.getElementById('initial-capital').value);

    document.getElementById('run-btn').disabled = true;
    document.getElementById('run-btn').textContent = '运行中...';
    document.getElementById('result-section').classList.add('hidden');
    document.getElementById('progress-section').classList.remove('hidden');

    // 初始化进度行
    const progressRows = document.getElementById('progress-rows');
    progressRows.innerHTML = strategyRows.map(r => {
      const strat = allStrategies.find(s => s.id === r.strategyId);
      return `
        <div id="prog-${r.rowId}" class="space-y-1">
          <div class="flex items-center justify-between text-xs">
            <div class="flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${r.color}"></span>
              <span class="text-gray-300">${strat?.name ?? r.strategyId}</span>
            </div>
            <span id="prog-${r.rowId}-status" class="text-gray-500">等待中</span>
          </div>
          <div class="w-full bg-gray-800 rounded-full h-1">
            <div id="prog-${r.rowId}-bar" class="h-1 rounded-full transition-all duration-300" style="width:0%;background:${r.color}"></div>
          </div>
          <p id="prog-${r.rowId}-detail" class="text-xs text-gray-600"></p>
        </div>`;
    }).join('');

    // 顺序运行每个策略
    const results = [];
    for (const row of strategyRows) {
      const strat = allStrategies.find(s => s.id === row.strategyId);
      const params = getRowParams(row.rowId);

      setRowStatus(row.rowId, '运行中', row.color);

      try {
        const { run_id } = await API.runBacktest({
          strategy_id: row.strategyId,
          symbols,
          start_date: startDate,
          end_date: endDate,
          initial_capital: capital,
          strategy_params: params,
          risk: { max_position_pct: 0.95, min_cash_reserve: 0.05 },
          enable_capacity_limit: true,
          max_volume_participation: 0.10,
          universe: activeUniverse,
        });

        await waitForCompletion(run_id, row.rowId, row.color);
        const result = await API.getResult(run_id);
        results.push({ row, run_id, result, name: strat?.name ?? row.strategyId });
        setRowStatus(row.rowId, '完成', row.color);
      } catch (e) {
        setRowStatus(row.rowId, `失败: ${e.message}`, '#f87171');
      }
    }

    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').textContent = '重新对比';

    if (results.length >= 1) renderResults(results);
  }

  function setRowStatus(rowId, text, color) {
    const el = document.getElementById(`prog-${rowId}-status`);
    if (el) { el.textContent = text; el.style.color = color; }
  }

  function waitForCompletion(runId, rowId, color) {
    return new Promise((resolve, reject) => {
      const sse = new EventSource(`/api/backtest/${runId}/stream`);

      sse.addEventListener('progress', e => {
        const d = JSON.parse(e.data);
        const pct = d.progress || 0;
        const bar = document.getElementById(`prog-${rowId}-bar`);
        const detail = document.getElementById(`prog-${rowId}-detail`);
        if (bar) bar.style.width = pct + '%';
        if (detail) detail.textContent = d.current_date || '';
      });

      sse.addEventListener('completed', e => {
        sse.close();
        const bar = document.getElementById(`prog-${rowId}-bar`);
        if (bar) bar.style.width = '100%';
        resolve();
      });

      sse.addEventListener('error', e => {
        sse.close();
        try {
          const d = JSON.parse(e.data);
          reject(new Error(d.message || '回测失败'));
        } catch { reject(new Error('回测失败')); }
      });

      sse.onerror = () => {
        sse.close();
        // SSE 断开后轮询兜底
        pollCompletion(runId, rowId).then(resolve).catch(reject);
      };
    });
  }

  async function pollCompletion(runId, rowId) {
    while (true) {
      await sleep(1500);
      const s = await API.getStatus(runId);
      const bar = document.getElementById(`prog-${rowId}-bar`);
      if (bar) bar.style.width = (s.progress || 0) + '%';
      if (s.status === 'completed') return;
      if (s.status === 'failed') throw new Error(s.error || '回测失败');
    }
  }

  // ── 渲染结果 ──────────────────────────────────────────────────────────────
  function renderResults(results) {
    document.getElementById('result-section').classList.remove('hidden');
    renderEvaluationPanel(results);
    renderCompareChart(results);
    renderMetricsTable(results);
  }

  function renderEvaluationPanel(results) {
    const assessments = results.map(r => ({ ...r, assessment: assessRun(r.result, r.result.symbols || [...selectedSymbols]) }));
    const sorted = [...assessments].sort((a, b) => b.assessment.score - a.assessment.score);
    const best = sorted[0];
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;
    const years = sampleYears(startDate, endDate);
    const symCount = selectedSymbols.size || results[0]?.result?.symbols?.length || 0;

    document.getElementById('sample-summary').textContent = `${symCount} 只股票 / ${years.toFixed(1)} 年`;
    document.getElementById('evaluation-panel').innerHTML = assessments.map(r => {
      const a = r.assessment;
      return `
        <div class="bg-gray-800/70 border border-gray-700 rounded-lg p-4">
          <div class="flex items-start justify-between gap-3 mb-3">
            <div>
              <div class="text-sm font-semibold" style="color:${r.row.color}">${r.name}</div>
              <a href="/result.html?run_id=${r.run_id}" class="text-xs text-gray-500 hover:text-gray-300">查看详情 ↗</a>
            </div>
            <div class="text-right">
              <div class="text-2xl font-bold ${a.scoreClass}">${a.score}</div>
              <div class="text-[11px] ${a.scoreClass}">${a.rating}</div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <div class="text-gray-500">年化 <span class="${a.annual >= 0 ? 'text-red-400' : 'text-green-400'} font-semibold">${fmtPct(a.annual)}</span></div>
            <div class="text-gray-500">回撤 <span class="${a.drawdown <= 0.15 ? 'text-red-400' : 'text-green-400'} font-semibold">${fmtPct(-a.drawdown)}</span></div>
            <div class="text-gray-500">卡玛 <span class="text-gray-200 font-semibold">${fmtNum(a.calmar, 2)}</span></div>
            <div class="text-gray-500">交易 <span class="text-gray-200 font-semibold">${a.trades} 笔</span></div>
          </div>
          <div class="mt-3 space-y-1">
            ${a.notes.slice(0, 2).map(n => `<div class="text-xs text-gray-400">${n}</div>`).join('') || '<div class="text-xs text-gray-400">核心指标无明显异常</div>'}
          </div>
        </div>`;
    }).join('');

    const sampleIssues = [];
    if (symCount < 20) sampleIssues.push(`股票池 ${symCount} 只，适合功能验证，不足以判断泛化能力`);
    if (years < 3) sampleIssues.push(`区间 ${years.toFixed(1)} 年，市场阶段覆盖偏窄`);
    if (!sampleIssues.length) sampleIssues.push('样本跨度和股票数量可用于第一轮横向比较');

    const decision = best
      ? `${best.name} 当前综合评分最高；如果它的回撤和交易样本也可接受，再进入样本外区间复验。`
      : '暂无可评估结果';

    document.getElementById('evaluation-notes').innerHTML = `
      <div class="bg-gray-800/50 border border-gray-700 rounded-lg p-4">
        <div class="text-xs text-gray-500 mb-2">样本质量</div>
        <div class="space-y-1">${sampleIssues.map(n => `<div class="text-sm text-gray-300">${n}</div>`).join('')}</div>
      </div>
      <div class="bg-gray-800/50 border border-gray-700 rounded-lg p-4">
        <div class="text-xs text-gray-500 mb-2">决策提示</div>
        <div class="text-sm text-gray-300">${decision}</div>
      </div>
    `;
  }

  function assessRun(result, symbols) {
    const m = result.metrics || {};
    const annual = finite(m.annual_return);
    const sharpe = finite(m.sharpe_ratio);
    const calmar = finite(m.calmar_ratio);
    const drawdown = Math.abs(finite(m.max_drawdown));
    const trades = finite(m.total_trades);
    const years = sampleYears(result.start_date, result.end_date);
    const symbolCount = symbols.length;
    const feeDrag = finite(m.total_fees) / (finite(m.initial_value) || 1);

    let score = 50;
    score += clamp(annual * 220, -25, 25);
    score += clamp(sharpe * 8, -10, 14);
    score += clamp(calmar * 12, -12, 18);
    if (drawdown <= 0.08) score += 10;
    else if (drawdown <= 0.15) score += 4;
    else if (drawdown > 0.35) score -= 24;
    else if (drawdown > 0.25) score -= 15;
    else if (drawdown > 0.18) score -= 8;
    if (trades < 8) score -= 12;
    if (years < 2) score -= 10;
    if (symbolCount < 20) score -= 6;
    if (feeDrag > 0.03) score -= 6;
    score = Math.round(clamp(score, 0, 100));

    const notes = [];
    if (drawdown > 0.25) notes.push('回撤过深，优先降风险');
    else if (drawdown <= 0.10) notes.push('回撤控制较好');
    if (calmar < 0.3) notes.push('收益/回撤效率偏弱');
    if (trades < 8) notes.push('交易样本偏少');
    if (feeDrag > 0.03) notes.push('费用拖累偏高');

    return {
      score,
      annual,
      drawdown,
      calmar,
      trades,
      notes,
      rating: score >= 75 ? '可复验' : score >= 60 ? '可优化' : score >= 45 ? '观察' : '高风险',
      scoreClass: score >= 75 ? 'text-red-400' : score >= 60 ? 'text-yellow-300' : score >= 45 ? 'text-gray-300' : 'text-green-400',
    };
  }

  function renderCompareChart(results) {
    const chart = echarts.init(document.getElementById('compare-chart'), null, { renderer: 'canvas' });

    // 找最长的 dates 序列作为 x 轴（各策略 dates 可能略有不同）
    const allDates = results.reduce((max, r) =>
      r.result.equity_curve.dates.length > max.length ? r.result.equity_curve.dates : max, []);

    const series = results.map(r => {
      const dates = r.result.equity_curve.dates;
      const values = r.result.equity_curve.values;
      const initial = values[0] || 1;
      // 转为收益率 %，与 x 轴（allDates）对齐
      const dateIdx = Object.fromEntries(dates.map((d, i) => [d, i]));
      const data = allDates.map(d => {
        const i = dateIdx[d];
        if (i === undefined) return null;
        return +((values[i] / initial - 1) * 100).toFixed(2);
      });
      return {
        name: r.name,
        type: 'line',
        data,
        smooth: false,
        symbol: 'none',
        lineStyle: { color: r.row.color, width: 1.5 },
        itemStyle: { color: r.row.color },
        emphasis: { disabled: true },
      };
    });

    // 零线
    const zeroLine = {
      name: '基准（0%）',
      type: 'line',
      data: allDates.map(() => 0),
      symbol: 'none',
      lineStyle: { color: '#374151', width: 1, type: 'dashed' },
      itemStyle: { color: '#374151' },
      tooltip: { show: false },
    };

    chart.setOption({
      backgroundColor: 'transparent',
      grid: { left: 60, right: 30, top: 30, bottom: 60 },
      xAxis: {
        type: 'category', data: allDates,
        axisLine: { lineStyle: { color: '#374151' } },
        axisLabel: { color: '#6b7280', fontSize: 10 },
        splitLine: { show: false },
      },
      yAxis: {
        type: 'value',
        axisLabel: { color: '#6b7280', fontSize: 10, formatter: v => v.toFixed(0) + '%' },
        splitLine: { lineStyle: { color: '#1f2937' } },
      },
      tooltip: {
        trigger: 'axis',
        backgroundColor: '#1f2937', borderColor: '#374151',
        textStyle: { color: '#e5e7eb', fontSize: 12 },
        formatter(params) {
          const date = params[0]?.axisValue;
          let html = `<div style="font-weight:600;margin-bottom:4px">${date}</div>`;
          params.filter(p => p.seriesName !== '基准（0%）').forEach(p => {
            if (p.value == null) return;
            const v = p.value;
            const color = v >= 0 ? '#ef4444' : '#22c55e';
            html += `<div style="display:flex;justify-content:space-between;gap:16px">
              <span>${p.marker}${p.seriesName}</span>
              <span style="color:${color};font-weight:600">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>
            </div>`;
          });
          return html;
        },
      },
      legend: {
        data: results.map(r => r.name),
        textStyle: { color: '#9ca3af', fontSize: 11 },
        top: 5,
      },
      dataZoom: [
        { type: 'inside', start: 0, end: 100 },
        { type: 'slider', height: 20, bottom: 10, borderColor: '#374151', fillerColor: 'rgba(96,165,250,0.1)', textStyle: { color: '#6b7280' } },
      ],
      series: [...series, zeroLine],
    });

    window.addEventListener('resize', () => chart.resize());
  }

  function renderMetricsTable(results) {
    const METRICS = [
      { key: 'total_return',    label: '总收益率',   fmt: v => fmtPct(v), colorFn: v => v >= 0 ? '#ef4444' : '#22c55e' },
      { key: 'annual_return',   label: '年化收益率', fmt: v => fmtPct(v), colorFn: v => v >= 0 ? '#ef4444' : '#22c55e' },
      { key: 'max_drawdown',    label: '最大回撤',   fmt: v => fmtPct(v), colorFn: () => '#22c55e' },
      { key: 'sharpe_ratio',    label: '夏普比率',   fmt: v => v.toFixed(3), colorFn: v => v >= 1 ? '#ef4444' : v >= 0 ? '#e5e7eb' : '#22c55e' },
      { key: 'sortino_ratio',   label: '索提诺比率', fmt: v => v.toFixed(3), colorFn: () => '#e5e7eb' },
      { key: 'calmar_ratio',    label: '卡玛比率',   fmt: v => v.toFixed(3), colorFn: () => '#e5e7eb' },
      { key: 'win_rate',        label: '胜率',       fmt: v => fmtPct(v), colorFn: v => v >= 0.5 ? '#ef4444' : '#22c55e' },
      { key: 'profit_factor',   label: '盈亏比',     fmt: v => v.toFixed(2), colorFn: v => v >= 1 ? '#ef4444' : '#22c55e' },
      { key: 'total_trades',    label: '总交易次数', fmt: v => v + ' 笔', colorFn: () => '#e5e7eb' },
      { key: 'total_fees',      label: '总手续费',   fmt: v => fmtMoney(v), colorFn: () => '#fbbf24' },
      { key: 'final_value',     label: '最终净值',   fmt: v => fmtMoney(v), colorFn: () => '#e5e7eb' },
    ];

    const table = document.getElementById('metrics-table');

    // 表头
    const thead = `<thead><tr class="border-b border-gray-700">
      <th class="text-left py-2 pr-6 text-xs text-gray-500 font-normal">指标</th>
      ${results.map(r => `
        <th class="text-right py-2 px-4 text-xs font-semibold" style="color:${r.row.color}">
          ${r.name}
          <a href="/result.html?run_id=${r.run_id}" class="ml-1 text-gray-600 hover:text-gray-400 font-normal" title="查看详情">↗</a>
        </th>`).join('')}
    </tr></thead>`;

    // 每行：找最优值高亮
    const tbody = '<tbody>' + METRICS.map(m => {
      const vals = results.map(r => r.result.metrics[m.key]);
      // 找最优值（收益/夏普等越大越好；回撤越小越好）
      const bestIdx = findBestIdx(m.key, vals);

      const cells = results.map((r, i) => {
        const v = vals[i];
        if (v == null) return `<td class="text-right py-2 px-4 text-sm text-gray-600">—</td>`;
        const color = m.colorFn(v);
        const isBest = i === bestIdx;
        return `<td class="text-right py-2 px-4 text-sm font-medium ${isBest ? 'relative' : ''}" style="color:${color}">
          ${isBest ? `<span class="absolute left-1 top-1/2 -translate-y-1/2 text-yellow-400 text-xs">★</span>` : ''}
          ${m.fmt(v)}
        </td>`;
      }).join('');

      return `<tr class="border-b border-gray-800/60 hover:bg-gray-800/20">
        <td class="py-2 pr-6 text-sm text-gray-400">${m.label}</td>
        ${cells}
      </tr>`;
    }).join('') + '</tbody>';

    table.innerHTML = thead + tbody;
  }

  function findBestIdx(key, vals) {
    const lowerIsBetter = new Set(['total_fees']);
    const filtered = vals.map((v, i) => ({ v, i })).filter(x => x.v != null);
    if (!filtered.length) return -1;
    if (lowerIsBetter.has(key)) {
      return filtered.reduce((best, x) => x.v < best.v ? x : best).i;
    }
    return filtered.reduce((best, x) => x.v > best.v ? x : best).i;
  }

  // ── 工具函数 ──────────────────────────────────────────────────────────────
  function fmtPct(v) {
    if (v == null) return '—';
    const s = (v * 100).toFixed(2) + '%';
    return v >= 0 ? '+' + s : s;
  }
  function fmtMoney(v) {
    if (v == null) return '—';
    return (v / 10000).toFixed(2) + ' 万';
  }
  function fmtNum(v, digits = 2) {
    return Number.isFinite(Number(v)) ? Number(v).toFixed(digits) : '—';
  }
  function updateSampleCheck() {
    const countEl = document.getElementById('sample-symbol-count');
    if (!countEl) return;

    const years = sampleYears(
      document.getElementById('start-date')?.value,
      document.getElementById('end-date')?.value
    );
    const count = selectedSymbols.size;
    const quality = sampleQuality(count, years);

    countEl.textContent = count;
    document.getElementById('sample-years').textContent = years ? years.toFixed(1) + ' 年' : '—';
    document.getElementById('sample-purpose').textContent = quality.purpose;
    document.getElementById('sample-check-note').textContent = quality.note;

    const badge = document.getElementById('sample-check-badge');
    badge.textContent = quality.label;
    badge.className = `text-xs ${quality.cls}`;
  }
  function sampleQuality(symbolCount, years) {
    if (symbolCount === 0) {
      return { label: '待选择', purpose: '—', note: '添加股票后会自动评估样本质量', cls: 'text-gray-500' };
    }
    if (symbolCount < 10 || years < 1) {
      return { label: '样本偏小', purpose: '功能验证', note: '适合检查策略能否运行，不适合判断策略好坏', cls: 'text-yellow-300' };
    }
    if (symbolCount < 30 || years < 3) {
      return { label: '初步研究', purpose: '参数观察', note: '可以粗看方向，但需要扩大股票池或拉长周期后复验', cls: 'text-gray-300' };
    }
    if (symbolCount < 50) {
      return { label: '可比较', purpose: '横向比较', note: '可用于第一轮策略比较，样本外验证仍然必要', cls: 'text-red-400' };
    }
    return { label: '较充分', purpose: '稳健性检查', note: '适合观察收益、回撤、费用和交易样本的综合表现', cls: 'text-red-400' };
  }
  function sampleYears(startDate, endDate) {
    const start = Date.parse(startDate);
    const end = Date.parse(endDate);
    if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return 0;
    return (end - start) / 86400000 / 365.25;
  }
  function finite(v) {
    return Number.isFinite(Number(v)) ? Number(v) : 0;
  }
  function clamp(v, min, max) {
    return Math.min(max, Math.max(min, v));
  }
  function showError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg; el.classList.remove('hidden');
  }
  function clearError() {
    document.getElementById('form-error').classList.add('hidden');
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
