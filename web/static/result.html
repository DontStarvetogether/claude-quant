<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回测结果 — Claude Quant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-4 flex items-center gap-6">
    <span class="text-blue-400 font-bold tracking-tight">CLAUDE QUANT</span>
    <nav class="flex gap-4 text-sm">
      <a href="/" class="text-gray-400 hover:text-gray-100 transition-colors">回测</a>
      <a href="/strategies.html" class="text-gray-400 hover:text-gray-100 transition-colors">策略库</a>
      <a href="/data.html" class="text-gray-400 hover:text-gray-100 transition-colors">数据管理</a>
      <a href="/compare.html" class="text-gray-400 hover:text-gray-100 transition-colors">策略对比</a>
      <a href="/live.html" class="text-gray-400 hover:text-gray-100 transition-colors">交易</a>
    </nav>
    <div id="header-info" class="flex gap-3 text-sm text-gray-500">
      <span id="header-strategy">—</span>
      <span>|</span>
      <span id="header-symbols">—</span>
      <span>|</span>
      <span id="header-dates">—</span>
    </div>
  </header>

  <!-- 加载状态 -->
  <div id="loading" class="flex items-center justify-center h-64">
    <div class="text-gray-500 text-sm">加载中...</div>
  </div>

  <!-- 主内容（结果加载后显示）-->
  <main id="main-content" class="hidden max-w-7xl mx-auto px-4 py-8 space-y-8">

    <!-- 关键指标卡片 -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="metric-card">
        <p class="metric-label">总收益率</p>
        <p id="m-total-return" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">年化收益率</p>
        <p id="m-annual-return" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">最大回撤</p>
        <p id="m-max-drawdown" class="metric-value text-red-400">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">夏普比率</p>
        <p id="m-sharpe" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">胜率</p>
        <p id="m-win-rate" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">总交易次数</p>
        <p id="m-total-trades" class="metric-value">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">最终净值</p>
        <p id="m-final-value" class="metric-value">—</p>
        <p id="m-final-breakdown" class="text-xs text-gray-500 mt-1">—</p>
      </div>
      <div class="metric-card">
        <p class="metric-label">总手续费</p>
        <p id="m-total-fees" class="metric-value text-yellow-400">—</p>
        <p id="m-fees-breakdown" class="text-xs text-gray-500 mt-1">—</p>
      </div>
      <!-- 基准对比 -->
      <div class="metric-card benchmark-only hidden">
        <p class="metric-label">超额收益</p>
        <p id="m-excess-return" class="metric-value">—</p>
        <p id="m-benchmark-info" class="text-xs text-gray-500 mt-1">—</p>
      </div>
      <div class="metric-card benchmark-only hidden">
        <p class="metric-label">Alpha</p>
        <p id="m-alpha" class="metric-value">—</p>
      </div>
      <div class="metric-card benchmark-only hidden">
        <p class="metric-label">Beta</p>
        <p id="m-beta" class="metric-value">—</p>
      </div>
      <div class="metric-card benchmark-missing hidden">
        <p class="metric-label">基准对比</p>
        <p id="m-benchmark-missing" class="text-sm text-yellow-400 mt-2">—</p>
      </div>
    </section>

    <!-- 策略体检 -->
    <section id="strategy-assessment" class="bg-gray-900 border border-gray-800 rounded-xl p-5"></section>

    <!-- Alpha 拆解 -->
    <section id="alpha-breakdown" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-5">
      <div class="flex items-center justify-between gap-4 mb-4">
        <h2 class="text-sm font-semibold text-gray-300">Alpha 拆解</h2>
        <span id="alpha-benchmark-label" class="text-xs text-gray-500">—</span>
      </div>
      <div id="alpha-breakdown-body"></div>
      <div id="relative-strength-chart" class="mt-5" style="height: 220px;"></div>
    </section>

    <!-- 权益曲线 -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4">权益曲线 & 回撤</h2>
      <div id="equity-chart" style="height: 360px;"></div>
    </section>

    <!-- 月度收益 -->
    <section class="bg-gray-900 border border-gray-800 rounded-xl p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-1">月度收益</h2>
      <div id="monthly-bar-chart" style="height:180px;"></div>
      <div id="monthly-heatmap" class="mt-4 overflow-x-auto"></div>
    </section>

    <!-- 下方两栏：详细指标 + 成交记录 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- 详细指标 -->
      <section class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <h2 class="text-sm font-semibold text-gray-300 mb-4">详细指标</h2>
        <div class="space-y-1 text-sm" id="detail-metrics"></div>
      </section>

      <!-- 成交记录 -->
      <section class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <h2 class="text-sm font-semibold text-gray-300">成交记录</h2>
            <input id="trade-filter" type="text" placeholder="筛选股票代码或名称..."
              class="w-40 bg-gray-800 border border-gray-700 rounded px-2 py-1 text-xs text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500" />
          </div>
          <button id="export-csv-btn"
            class="text-xs text-blue-400 hover:text-blue-300 transition-colors">
            导出 CSV
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="text-gray-500 border-b border-gray-800">
                <th class="text-left pb-2">交易ID</th>
                <th class="text-left pb-2">日期</th>
                <th class="text-left pb-2">方向</th>
                <th class="text-left pb-2">股票</th>
                <th class="text-right pb-2">价格</th>
                <th class="text-right pb-2">数量</th>
                <th class="text-right pb-2">成交额</th>
                <th class="text-right pb-2">佣金</th>
                <th class="text-right pb-2">印花税</th>
                <th class="text-right pb-2">净额</th>
                <th class="text-right pb-2">持有现金</th>
              </tr>
            </thead>
            <tbody id="trades-tbody" class="divide-y divide-gray-800/50"></tbody>
          </table>
        </div>
        <p id="trades-summary" class="text-xs text-gray-600 mt-3"></p>
      </section>

    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/result.js?v=21"></script>
</body>
</html>
