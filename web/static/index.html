<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Quant — 量化回测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-blue-400 text-xl font-bold tracking-tight">CLAUDE QUANT</span>
      <span class="text-gray-500 text-sm">量化回测平台</span>
    </div>
    <a href="#history-section" class="text-sm text-gray-400 hover:text-blue-400 transition-colors">历史记录</a>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- 左栏：回测配置 -->
    <section>
      <h2 class="text-lg font-semibold text-gray-200 mb-6">回测配置</h2>

      <form id="backtest-form" class="space-y-5">

        <!-- 策略选择 -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">策略</label>
          <select id="strategy-select"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500">
            <option value="">加载中...</option>
          </select>
          <p id="strategy-desc" class="text-xs text-gray-500 mt-1"></p>
        </div>

        <!-- 股票代码 -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">股票代码</label>
          <div class="flex gap-2">
            <input id="symbol-input" type="text" placeholder="如 600519.SH"
              class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-blue-500" />
            <button type="button" id="add-symbol-btn"
              class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">添加</button>
          </div>
          <!-- 快速选择 -->
          <div class="flex gap-2 mt-2 flex-wrap">
            <button type="button" data-symbol="600519.SH" class="quick-symbol px-3 py-1 bg-gray-800 border border-gray-700 rounded-full text-xs hover:border-blue-500 transition-colors">茅台</button>
            <button type="button" data-symbol="000858.SZ" class="quick-symbol px-3 py-1 bg-gray-800 border border-gray-700 rounded-full text-xs hover:border-blue-500 transition-colors">五粮液</button>
            <button type="button" data-symbol="000001.SZ" class="quick-symbol px-3 py-1 bg-gray-800 border border-gray-700 rounded-full text-xs hover:border-blue-500 transition-colors">平安银行</button>
            <button type="button" data-symbol="600036.SH" class="quick-symbol px-3 py-1 bg-gray-800 border border-gray-700 rounded-full text-xs hover:border-blue-500 transition-colors">招商银行</button>
            <button type="button" data-symbol="300750.SZ" class="quick-symbol px-3 py-1 bg-gray-800 border border-gray-700 rounded-full text-xs hover:border-blue-500 transition-colors">宁德时代</button>
          </div>
          <!-- 已选标签 -->
          <div id="symbol-tags" class="flex gap-2 mt-2 flex-wrap min-h-8"></div>
        </div>

        <!-- 日期区间 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">开始日期</label>
            <input id="start-date" type="date" value="2022-01-01"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">结束日期</label>
            <input id="end-date" type="date" value="2024-12-31"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500" />
          </div>
        </div>

        <!-- 初始资金 -->
        <div>
          <label class="block text-sm text-gray-400 mb-1">初始资金（元）</label>
          <input id="initial-capital" type="number" value="1000000" min="10000" step="10000"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500" />
        </div>

        <!-- 策略参数（动态渲染）-->
        <div id="strategy-params" class="space-y-4 border border-gray-800 rounded-lg p-4">
          <p class="text-sm text-gray-500">请选择策略</p>
        </div>

        <!-- 风控参数（折叠）-->
        <details class="border border-gray-800 rounded-lg overflow-hidden">
          <summary class="px-4 py-3 text-sm text-gray-400 cursor-pointer hover:text-gray-200 transition-colors select-none">
            风控参数
          </summary>
          <div class="px-4 pb-4 pt-2 space-y-3">
            <div>
              <label class="flex justify-between text-sm text-gray-400 mb-1">
                <span>单股最大仓位</span>
                <span id="max-pos-label">20%</span>
              </label>
              <input id="max-pos-pct" type="range" min="5" max="100" value="20" step="5"
                class="w-full accent-blue-500" />
            </div>
            <div>
              <label class="flex justify-between text-sm text-gray-400 mb-1">
                <span>最低现金储备</span>
                <span id="min-cash-label">5%</span>
              </label>
              <input id="min-cash-reserve" type="range" min="0" max="30" value="5" step="1"
                class="w-full accent-blue-500" />
            </div>
          </div>
        </details>

        <!-- 提交按钮 -->
        <button type="submit" id="run-btn"
          class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-semibold text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          运行回测
        </button>

        <!-- 错误提示 -->
        <div id="form-error" class="hidden text-red-400 text-sm px-3 py-2 bg-red-900/30 rounded-lg border border-red-800"></div>

      </form>
    </section>

    <!-- 右栏：运行状态 + 历史记录 -->
    <section class="space-y-8">

      <!-- 运行状态卡片 -->
      <div id="run-status-card" class="hidden border border-gray-800 rounded-xl p-5 bg-gray-900">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-gray-300">回测运行中</h3>
          <span id="status-elapsed" class="text-xs text-gray-500">0.0s</span>
        </div>

        <!-- 进度条 -->
        <div class="w-full bg-gray-800 rounded-full h-2 mb-3">
          <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-xs text-gray-500 mb-4">
          <span id="progress-text">0%</span>
          <span id="current-date-text"></span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-800 rounded-lg px-3 py-2">
            <p class="text-xs text-gray-500">当前总资产</p>
            <p id="status-assets" class="text-sm font-semibold text-green-400">—</p>
          </div>
          <div class="bg-gray-800 rounded-lg px-3 py-2">
            <p class="text-xs text-gray-500">策略</p>
            <p id="status-strategy" class="text-sm font-semibold text-blue-400">—</p>
          </div>
        </div>
      </div>

      <!-- 历史记录 -->
      <div id="history-section">
        <h2 class="text-lg font-semibold text-gray-200 mb-4">历史记录</h2>
        <div id="history-list" class="space-y-3">
          <p class="text-sm text-gray-600">暂无记录</p>
        </div>
      </div>

    </section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
